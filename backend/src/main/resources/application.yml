server:
  # Backend listens internally on 8443 using HTTPS
  port: 8443
  address: 0.0.0.0
  ssl:
    enabled: true
    # PKCS12 keystore generated by internal_certs (contains backend cert + key)
    key-store: /certs/internal/backend.p12
    key-store-type: PKCS12
    key-store-password: changeit


spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:mydb}
    username: ${POSTGRES_USER:app}
    password: ${POSTGRES_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: update

# Every request to this backend must include a JWT issued by this Keycloak realm, and I should validate it using that realm’s public keys
# A realm is simply a separate security space inside Keycloak. Each realm has its own users, roles, login settings, and applications. Nothing in one realm affects another
  security: 
    oauth2:
      resourceserver:
        jwt:
          # Must match the "iss" claim in the access tokens the browser gets.
          # Browser-facing issuer is https://localhost/auth/realms/health-realm
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://localhost/auth/realms/health-realm}

          # Where backend fetches JWKS keys to validate JWT signatures.
          # Uses internal HTTPS endpoint (keycloak container DNS name).
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:https://keycloak:8443/auth/realms/health-realm/protocol/openid-connect/certs}



