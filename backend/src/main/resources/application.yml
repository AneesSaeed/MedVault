server:
  port: 8443
  address: 0.0.0.0
  ssl:
    enabled: true
    key-store: /certs/internal/backend.p12
    key-store-type: PKCS12
    # SECURITY NOTE: Password "secret" is for DEVELOPMENT ONLY.
    # Matches docker-compose.yml and internal-certs/generate-internal-certs.sh
    key-store-password: secret

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:mydb}
    username: ${POSTGRES_USER:app}
    password: ${POSTGRES_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://localhost/auth/realms/health-realm}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:https://keycloak:8443/auth/realms/health-realm/protocol/openid-connect/certs}

# Custom Keycloak Admin API configuration (used by KeycloakAdminService)
# Properties are documented in META-INF/additional-spring-configuration-metadata.json
keycloak:
  admin:
    base-url: ${KEYCLOAK_ADMIN_BASE_URL:https://keycloak:8443/auth}
    realm: ${KEYCLOAK_ADMIN_REALM:health-realm}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:backend-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
