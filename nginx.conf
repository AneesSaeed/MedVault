events {}

http {
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /certs/localhost.pem;
        ssl_certificate_key /certs/localhost-key.pem;
        ssl_protocols       TLSv1.3;


        # Angular dev server (runs on host)
        location / {
            proxy_pass http://host.docker.internal:4200/;
        }

        # Spring Boot backend (runs on host)
        location /api/ {
            proxy_pass http://host.docker.internal:8081;
        }

        # Keycloak server (inside Docker)
        location /auth/ {
            proxy_pass http://keycloak:8080/auth/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            # Needed so Keycloak knows its mount path
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        # Redirect /auth → /auth/
        location = /auth {
            return 301 /auth/;
        }
    }
}