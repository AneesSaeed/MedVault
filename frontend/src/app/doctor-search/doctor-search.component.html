<div class="page">
  <h2>Rechercher un médecin</h2>

  <div class="actions">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Nom ou prénom du médecin"
    />
    <button (click)="onSearch()" [disabled]="loading">Rechercher</button>
  </div>

  <div *ngIf="message" class="msg success">{{ message }}</div>
  <div *ngIf="error" class="msg error">{{ error }}</div>

  <div *ngIf="loading">Chargement…</div>

  <ul class="results" *ngIf="!loading && doctors.length">
    <li *ngFor="let d of doctors" class="result">
      <div class="info">
        <div class="name">{{ d.firstName }} {{ d.lastName }}</div>
        <div class="org">{{ d.medicalOrganization }}</div>
      </div>
      <button (click)="addDoctor(d)" [disabled]="addingId===d.doctorId">
        {{ addingId===d.doctorId ? 'Ajout…' : 'Ajouter' }}
      </button>
    </li>
  </ul>

  <div *ngIf="!loading && !doctors.length" class="empty">Aucun médecin trouvé.</div>
</div>
