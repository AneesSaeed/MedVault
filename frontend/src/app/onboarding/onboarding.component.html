<div class="backdrop"></div>

<div class="modal">
  <h2 class="title">Complete Your Registration</h2>

  <div class="identity-grid">
    <div class="field">
      <label>First name</label>
      <input type="text" [value]="auth.firstName" disabled>
    </div>

    <div class="field">
      <label>Last name</label>
      <input type="text" [value]="auth.lastName" disabled>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" [value]="auth.username" disabled>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" [value]="auth.email" disabled>
    </div>
  </div>

  <div *ngIf="!role" class="extra-form">
    <p class="subtitle">
      Role not found in your token. Please log out and log in again.
    </p>
    <button class="submit-btn" (click)="auth.logout()">
      Log out
    </button>
  </div>

  <div *ngIf="role" class="extra-form">
    <ng-container *ngIf="role === 'PATIENT'">
      <label>Date of birth</label>
      <input type="date" [(ngModel)]="dateOfBirth">
    </ng-container>

    <ng-container *ngIf="role === 'DOCTOR'">
      <label>Medical organisation</label>
      <input
        type="text"
        [(ngModel)]="medicalOrg"
        placeholder="Hospital, Clinic...">
    </ng-container>

    <button
      class="submit-btn"
      (click)="submit()"
      [disabled]="!isFormValid() || isSubmitting">
      Finish
    </button>
  </div>
</div>
