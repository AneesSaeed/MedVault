<div class="backdrop"></div>

<div class="modal">
  <h2 class="title">Complete Your Registration</h2>

  <div class="identity-grid">
    <div class="field">
      <label for="firstName">First name</label>
      <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" autocomplete="given-name">
    </div>

    <div class="field">
      <label for="lastName">Last name</label>
      <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" autocomplete="family-name">
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" [value]="auth.username" disabled>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" [value]="auth.email" disabled>
    </div>
  </div>

  @if (!role) {
    <div class="extra-form">
      <p class="subtitle">
        Role not found in your token. Please log out and log in again.
      </p>
      <button class="submit-btn" (click)="auth.logout()">
        Log out
      </button>
    </div>
  }

  @if (role) {
    <div class="extra-form">
      @if (role === 'PATIENT') {
        <label for="dateOfBirth">Date of birth</label>
        <input id="dateOfBirth" type="date" [(ngModel)]="dateOfBirth" name="dateOfBirth">
      }

      @if (role === 'DOCTOR') {
        <label for="medicalOrg">Medical organisation</label>
        <input
          id="medicalOrg"
          type="text"
          [(ngModel)]="medicalOrg"
          name="medicalOrg"
          placeholder="Hospital, Clinic...">
      }

      <button
        class="submit-btn"
        (click)="submit()"
        [disabled]="!isFormValid() || isSubmitting">
        Finish
      </button>
    </div>
  }
</div>
