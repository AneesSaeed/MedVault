<section *ngIf="role === 'PATIENT'" class="files-card">
  <h2>Medical record files</h2>

  <div *ngIf="error" class="error">{{ error }}</div>
  <div *ngIf="loading" class="muted">Loading...</div>

  <div class="upload-row">
    <input
      type="file"
      accept=".txt,.pdf,.doc,.docx,.jpg,.jpeg,.png,application/pdf,text/plain,image/jpeg,image/png,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      (change)="onNewFileChange($event)"
    />
    <div class="muted">
      Allowed: .txt, .pdf, .doc/.docx, .jpg/.jpeg, .png — max 10 MB
    </div>
    <button (click)="upload()" [disabled]="!selectedNewFile || loading">
      Upload
    </button>
  </div>

  <div *ngIf="!loading && files.length === 0" class="muted">
    No files uploaded yet.
  </div>

  <table *ngIf="filesVm.length > 0" class="files-table">
    <thead>
      <tr>
        <th>Filename</th>
        <th>Uploaded</th>
        <th>Size (bytes)</th>
        <th>Download</th>
        <th>Overwrite</th>
        <th>Delete</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let f of filesVm">
        <td>{{ f.fileName }}</td>
        <td>{{ f.uploadDateIso | date:'medium' }}</td>
        <td>{{ f.sizeBytes }}</td>

        <td>
          <button (click)="download(f)" [disabled]="loading">Download</button>
        </td>

        <td class="overwrite-cell">
          <input type="file" (change)="onOverwriteFileChange(f.id, $event)" />
          <button (click)="overwrite(f)" [disabled]="!overwriteSelection[f.id] || loading">
            Overwrite
          </button>
        </td>

        <td>
          <button class="danger" (click)="delete(f.id)" [disabled]="loading">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
