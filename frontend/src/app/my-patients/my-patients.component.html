<div class="page">
  <div class="top">
    <h2>Mes patients</h2>
  </div>

  @if (loading) {
    <div class="muted">Chargement…</div>
  }
  @if (error) {
    <div class="msg error">{{ error }}</div>
  }

  @if (!loading && !error && patients.length) {
    <div class="folders">
      @for (p of patients; track p.patientId) {
        <button
          type="button"
          class="folder"
          (click)="openPatient(p)"
        >
          <div class="icon" aria-hidden="true"></div>
          <div class="text">
            <div class="name">{{ p.firstName }} {{ p.lastName }}</div>
            <div class="meta">{{ p.email }}</div>
          </div>
        </button>
      }
    </div>
  }

  @if (!loading && !error && !patients.length) {
    <div class="empty">
      Aucun patient à afficher.
    </div>
  }
</div>

@if (modalOpen) {
  <app-base-modal
    [title]="modalTitle"
    [component]="modalComponent"
    [data]="modalData"
    (closed)="onModalClosed()"
  ></app-base-modal>
}
