events {}

http {
    server {
        # Public entrypoint: browser -> nginx over TLS on 443
        listen 443 ssl;
        server_name localhost;

        # Edge TLS cert presented to the browser for https://localhost
        ssl_certificate     /certs/localhost.pem;
        ssl_certificate_key /certs/localhost-key.pem;
        ssl_protocols       TLSv1.3;


        location / {
            proxy_pass http://angular:4200/;
        }

        location /api/ {
            # Internal TLS: nginx -> backend over HTTPS
            proxy_pass https://backend:8443;
          
            # Forwarded headers so backend knows original scheme/host/client IP
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  
            # Trust anchor for upstream verification:
            # Only certificates signed by this internal CA are accepted.
            proxy_ssl_trusted_certificate /certs/internal/ca.crt;
            proxy_ssl_verify on;

            # Enforce hostname verification using the upstream name ("backend")
            # -> requires backend certificate SAN to include DNS:backend
            proxy_ssl_server_name on;
        }

        location /auth/ {
            proxy_pass https://keycloak:8443/auth/;

            proxy_ssl_trusted_certificate /certs/internal/ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        # Convenience redirect /auth -> /auth/
        location = /auth {
            return 301 /auth/;
        }
    }
}