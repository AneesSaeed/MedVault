events {}

http {

    client_max_body_size 10M;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /certs/localhost.pem;
        ssl_certificate_key /certs/localhost-key.pem;
        ssl_protocols       TLSv1.3;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        location /logs {
            proxy_pass https://logstash:5002;

            proxy_ssl_trusted_certificate /certs/internal/ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            client_max_body_size 10m;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;

            add_header Content-Security-Policy 
                "default-src 'self';
                script-src 'self';
                style-src 'self' 'unsafe-inline';
                connect-src 'self' https://localhost/api https://localhost/auth wss://localhost wss://localhost:4200;
                object-src 'none';
                frame-ancestors 'none';"
            always;

            proxy_pass http://angular:4200/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            # Allow file uploads up to 15MB (10MB file + overhead for multipart encoding)
            client_max_body_size 15M;
            
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;

            proxy_pass https://backend:8443;
          
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  
            proxy_ssl_trusted_certificate /certs/internal/ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_server_name on;
        }

        location ^~ /auth/admin/ {
            return 404;
        }

        location /auth/ {
            proxy_pass https://keycloak:8443/auth/;

            proxy_ssl_trusted_certificate /certs/internal/ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        location = /auth {
            return 301 /auth/;
        }
    }
}
