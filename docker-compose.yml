services:
  internal_certs:
    # Generates the internal CA + service certs into a named volume.
    build: ./internal-certs
    container_name: internal_certs
    volumes:
      - internal_certs:/certs/internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /certs/internal/ca.crt && test -f /certs/internal/truststore.jks && test -f /certs/internal/backend.p12 && test -f /certs/internal/keycloak.crt && test -f /certs/internal/keycloak.key"
        ]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 2s

  db:
    image: postgres:16
    container_name: postgres_app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  keycloak_db:
    image: postgres:16
    container_name: postgres_keycloak
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "5050:8080"
    depends_on:
      - db
    restart: always
    # NOTE: Adminer is a development tool for database management (web UI for PostgreSQL)

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: false
      KC_SPI_THEME_CACHE_TEMPLATES: false
    command:
      - start
      - --import-realm
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --http-relative-path=/auth

      # Keycloak HTTPS server cert/key (issued by internal CA)
      - --https-certificate-file=/certs/internal/keycloak.crt
      - --https-certificate-key-file=/certs/internal/keycloak.key
      - --https-port=8443
      
      # Disable HTTP entirely (prevents bypassing TLS over Docker network)
      - --http-enabled=false
    depends_on:
      internal_certs:
        condition: service_healthy
      keycloak_db:
        condition: service_healthy
    # Only internal port, not published to host.
    expose:
    - "8443"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
      # Read-only: Keycloak consumes cert material, cannot modify it
      - internal_certs:/certs/internal:ro
    restart: always
  
  # === ELK STACK FOR LOGGING ===
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    group_add:
      - 0  # allow reading 640 keys issued to group 0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.verification_mode=certificate
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/internal/elasticsearch.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/internal/elasticsearch.key
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/internal/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/internal/elasticsearch.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/internal/elasticsearch.key
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/internal/ca.crt
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - internal_certs:/usr/share/elasticsearch/config/certs/internal:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert /usr/share/elasticsearch/config/certs/internal/ca.crt -u elastic:${ELASTIC_PASSWORD} https://elasticsearch:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Initialize Kibana password in Elasticsearch
  setup_kibana_password:
    image: curlimages/curl:latest
    container_name: setup_kibana_password
    volumes:
      - ./scripts:/scripts:ro
      - internal_certs:/certs/internal:ro
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
      - CA_CERT=/certs/internal/ca.crt
    command: ["/bin/sh", "/scripts/setup-kibana-password.sh"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      internal_certs:
        condition: service_healthy
    restart: "no"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    group_add:
      - 0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/patterns:/usr/share/logstash/patterns
      - ./logstash/config:/usr/share/logstash/config:ro
      # Mount internal CA certs for HTTPS
      - internal_certs:/certs/internal:ro
    ports:
      - "5000:5000"     # TCP input from backend
      - "5002:5002"     # HTTPS input from frontend
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup_kibana_password:
        condition: service_completed_successfully
      internal_certs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 && timeout 1 bash -c '</dev/tcp/localhost/5000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    group_add:
      - 0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/internal/ca.crt
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/usr/share/kibana/config/certs/internal/kibana.crt
      - SERVER_SSL_KEY=/usr/share/kibana/config/certs/internal/kibana.key
      - XPACK_SECURITY_ENCRYPTION_KEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTED_SAVED_OBJECTS_ENCRYPTION_KEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTION_KEY=${KIBANA_ENCRYPTION_KEY}
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup_kibana_password:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/curl -sf --cacert /usr/share/kibana/config/certs/internal/ca.crt --resolve kibana:5601:127.0.0.1 https://kibana:5601/api/status > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always
    volumes:
      - internal_certs:/usr/share/kibana/config/certs/internal:ro

  # Import Kibana saved objects (dashboards, visualizations, etc.)
  import_kibana_objects:
    image: curlimages/curl:latest
    container_name: import_kibana_objects
    volumes:
      - ./scripts:/scripts:ro
      - ./kibana:/kibana:ro
      - internal_certs:/certs/internal:ro
    environment:
      - KIBANA_HOST=kibana:5601
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - IMPORT_FILE=/kibana/healthsec-full-import.ndjson
      - CA_CERT=/certs/internal/ca.crt
    command: ["/bin/sh", "/scripts/import-kibana-objects.sh"]
    depends_on:
      kibana:
        condition: service_started
      internal_certs:
        condition: service_healthy
    restart: "no"


  backend:
    build: ./backend
    container_name: spring_backend
    environment:
      DB_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Issuer must match tokens coming from the browser-facing URL
      KEYCLOAK_ISSUER_URI: https://localhost/auth/realms/health-realm
      # JWKS fetched over internal HTTPS from Keycloak container name
      KEYCLOAK_JWKS_URI: https://keycloak:8443/auth/realms/health-realm/protocol/openid-connect/certs

      # After adding roles attribute to keycloak
      KEYCLOAK_ADMIN_BASE_URL: https://keycloak:8443/auth
      KEYCLOAK_ADMIN_REALM: health-realm
      KEYCLOAK_ADMIN_CLIENT_ID: backend-client
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}

      # JVM truststore includes our internal CA,
      # allowing TLS verification of https://keycloak:8443
      # SECURITY NOTE: Password "secret" is for DEVELOPMENT ONLY (matches internal-certs/generate-internal-certs.sh)
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/certs/internal/truststore.jks
        -Djavax.net.ssl.trustStorePassword=secret
    volumes:
      - internal_certs:/certs/internal:ro
    depends_on:
      internal_certs:
        condition: service_healthy
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      # Ensure logstash is up before backend emits logs to it
      logstash:
        condition: service_healthy
    # Only internal port, not published to host
    expose:
      - "8443"

  angular:
    image: node:20
    container_name: angular_frontend
    working_dir: /usr/src/app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: >
      sh -c "npm install &&
             npm run start"
    depends_on:
      - backend
      - keycloak

  nginx:
    build: ./nginx 
    container_name: nginx
    ports:
      # Only nginx is exposed to host on 443
      - "443:443"
    volumes:
      # Edge TLS certs (localhost)
      - ./nginx/certs:/certs 
      # Internal CA (read-only) for upstream verification
      - internal_certs:/certs/internal:ro
    depends_on:
      internal_certs:
        condition: service_healthy
      angular:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_started
        
volumes:
  db_data:
  keycloak_db_data:
  internal_certs:
  elasticsearch_data: