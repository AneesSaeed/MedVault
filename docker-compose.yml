services:
  # -------------------------------
  # PostgreSQL database for our app
  # -------------------------------
  db:
    image: postgres:16
    container_name: postgres_app
    environment:
      # Values come from .env at project root
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  # ------------------------------------
  # Separate PostgreSQL instance for Keycloak
  # Keeps Keycloak user data isolated from app data
  # ------------------------------------
  keycloak_db:
    image: postgres:16
    container_name: keycloak_db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: always

  # ------------------------------------
  # Keycloak authentication/authorization server
  # Provides login, tokens, user management, and WebAuthn
  # ------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: keycloak
    environment:
      # Database connection info (connects to keycloak_db)
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # Admin credentials (used for Keycloak console login)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "9090:8080"
    command:
      - start-dev # Dev mode (fast startup)
    depends_on:
      - keycloak_db
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: always

  # ------------------------------------
  # Spring Boot backend (medical-records app)
  # Connects to PostgreSQL + authenticates via Keycloak
  # ------------------------------------
  backend:
    build: ./backend
    container_name: spring_backend
    environment:
      - DB_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/HealthRealm # it defines where our backend should look to validate JWT tokens issued by Keycloak
    depends_on:
      - db
      - keycloak
    ports:
      - "8081:8081"
      
volumes:
  db_data:
  keycloak_db_data:
  keycloak_data:
