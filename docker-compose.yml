services:
  internal_certs:
    # Generates the internal CA + service certs into a named volume.
    build: ./internal-certs
    container_name: internal_certs
    volumes:
      - internal_certs:/certs/internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /certs/internal/ca.crt && test -f /certs/internal/truststore.jks && test -f /certs/internal/backend.p12 && test -f /certs/internal/keycloak.crt && test -f /certs/internal/keycloak.key"
        ]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 2s

  db:
    image: postgres:16
    container_name: postgres_app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  keycloak_db:
    image: postgres:16
    container_name: postgres_keycloak
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "5050:8080"
    depends_on:
      - db
    restart: always
  
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    command:
      - start
      - --import-realm
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --http-relative-path=/auth

      # Keycloak HTTPS server cert/key (issued by internal CA)
      - --https-certificate-file=/certs/internal/keycloak.crt
      - --https-certificate-key-file=/certs/internal/keycloak.key
      - --https-port=8443
      
      # Disable HTTP entirely (prevents bypassing TLS over Docker network)
      - --http-enabled=false
    depends_on:
      internal_certs:
        condition: service_healthy
      keycloak_db:
        condition: service_healthy
    # Only internal port, not published to host.
    expose:
    - "8443"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
      # Read-only: Keycloak consumes cert material, cannot modify it
      - internal_certs:/certs/internal:ro
    restart: always

  backend:
    build: ./backend
    container_name: spring_backend
    environment:
      DB_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      KEYCLOAK_ISSUER_URI: https://localhost/auth/realms/health-realm # Issuer must match tokens coming from the browser-facing UR
      KEYCLOAK_JWKS_URI: https://keycloak:8443/auth/realms/health-realm/protocol/openid-connect/certs # JWKS fetched over internal HTTPS from Keycloak container name
      
      # JVM truststore includes our internal CA,
      # allowing TLS verification of https://keycloak:8443
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/certs/internal/truststore.jks
        -Djavax.net.ssl.trustStorePassword=secret
    volumes:
      - internal_certs:/certs/internal:ro
    depends_on:
      internal_certs:
        condition: service_healthy
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    # Only internal port, not published to host
    expose:
      - "8443"


  angular:
    image: node:20
    container_name: angular_frontend
    working_dir: /usr/src/app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: >
      sh -c "npm install &&
             npm run start -- --host 0.0.0.0 --disable-host-check"
    depends_on:
      - backend
      - keycloak

  nginx:
    build: ./nginx 
    container_name: nginx
    ports:
      # Only nginx is exposed to host on 443
      - "443:443"
    volumes:
      # Edge TLS certs (localhost)
      - ./nginx/certs:/certs 
      # Internal CA (read-only) for upstream verification
      - internal_certs:/certs/internal:ro
    depends_on:
      internal_certs:
        condition: service_healthy
      angular:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  db_data:
  keycloak_db_data:
  internal_certs: