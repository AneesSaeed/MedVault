services:
  db:
    image: postgres:16
    container_name: postgres_app
    environment:
      # Values come from .env at project root
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: keycloak
    environment:
      # Admin credentials (used for Keycloak console login)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "9090:8080"
    command:
      - start-dev # Dev mode (fast startup)
      - --import-realm
    volumes:
    - ./keycloak-config:/opt/keycloak/data/import
    restart: always


  backend:
    build: ./backend
    container_name: spring_backend
    environment:
      - DB_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/health-realm # it defines where our backend should look to validate JWT tokens issued by Keycloak
    depends_on:
      - db
      - keycloak
    ports:
      - "8081:8081"
      
volumes:
  db_data:
  keycloak_data:
