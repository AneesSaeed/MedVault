# HealthSec Logstash Configuration
# Receives logs from Frontend (HTTP) and Backend (TCP)
# Normalizes, enriches, and sends to Elasticsearch

input {
  # Frontend logs via HTTPS (Angular)
  http {
    host => "0.0.0.0"
    port => 5002
    codec => json
    tags => ["frontend", "angular"]
    ssl => true
    ssl_certificate => "/certs/internal/logstash.crt"
    ssl_key => "/certs/internal/logstash.key"
  }

  # Backend logs via TCP (Spring Boot)
  tcp {
    host => "0.0.0.0"
    port => 5000
    codec => json_lines
    tags => ["backend", "spring"]
  }

  # UDP fallback
  udp {
    host => "0.0.0.0"
    port => 5001
    codec => json
    tags => ["fallback"]
  }
}

filter {
  # Parse timestamp if exists, otherwise use current time
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }

  # Add environment metadata ONLY if not already present from the source
  # Spring Boot already sends environment, application, and version in customFields
  # Only add them if missing
  if ![environment] {
    mutate {
      add_field => {
        "environment" => "development"
      }
    }
  }
  
  if ![application] {
    mutate {
      add_field => {
        "application" => "healthsec"
      }
    }
  }
  
  if ![version] {
    mutate {
      add_field => {
        "version" => "1.0.0"
      }
    }
  }

  # Parse log level (extract from message if not present)
  if ![level] {
    grok {
      match => { "message" => "(?i)\b(TRACE|DEBUG|INFO|WARN|WARNING|ERROR|FATAL|CRITICAL)\b" }
      match => { "message" => "%{LOGLEVEL:level}" }
      add_tag => [ "parsed_level" ]
      tag_on_failure => [ "_grok_parse_failure" ]
    }
  }

  # Capitalize level for consistency
  mutate {
    uppercase => [ "level" ]
  }

  # Extract user ID from various log formats
  if ![userId] and [message] {
    grok {
      match => { "message" => "(?:user|userId|subject|keycloakId)[:\s]+(?<userId>[a-f0-9\-]+)" }
      add_tag => [ "parsed_userId" ]
      tag_on_failure => []
    }
  }

  # Extract component/service name
  if ![component] and [service] {
    mutate {
      rename => { "service" => "component" }
    }
  }

  # Add source information
  if "frontend" in [tags] {
    mutate {
      add_field => {
        "source_type" => "frontend"
        "source_location" => "browser"
      }
    }
  } else if "backend" in [tags] {
    mutate {
      add_field => {
        "source_type" => "backend"
        "source_location" => "server"
      }
    }
  }

  # Calculate log severity score for alerts
  if [level] == "ERROR" or [level] == "FATAL" or [level] == "CRITICAL" {
    mutate {
      add_field => { "severity_score" => "3" }
    }
  } else if [level] == "WARN" or [level] == "WARNING" {
    mutate {
      add_field => { "severity_score" => "2" }
    }
  } else if [level] == "INFO" {
    mutate {
      add_field => { "severity_score" => "1" }
    }
  } else {
    mutate {
      add_field => { "severity_score" => "0" }
    }
  }
  
  # Convert severity_score to integer
  mutate {
    convert => { "severity_score" => "integer" }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "host" ]
  }
}

output {
  # Always send to Elasticsearch
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    cacert => "/certs/internal/ca.crt"
    index => "healthsec-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Console output for debugging (comment out in production)
  stdout {
    codec => json
  }

  # Send critical errors to a separate index for alerting
  if [severity_score] >= 3 {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      ssl => true
      cacert => "/certs/internal/ca.crt"
      index => "healthsec-alerts-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }
}
